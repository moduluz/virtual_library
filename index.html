<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Narratives - Your Personal Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Auth Section -->
        <div id="auth-section" class="section">
            <h1>Welcome to Eternal Narratives</h1>
            <div class="auth-forms">
                <div class="form-container" id="login-form">
                    <h2>Login</h2>
                    <div id="login-error" class="error-message"></div>
                    <form onsubmit="return handleLogin(event)">
                        <input type="email" id="login-email" placeholder="Email" required>
                        <input type="password" id="login-password" placeholder="Password" required>
                        <button type="submit">Login</button>
                    </form>
                    <p>Don't have an account? <a href="#" onclick="toggleAuthForm()">Register</a></p>
                </div>
                <div class="form-container hidden" id="register-form">
                    <h2>Register</h2>
                    <div id="register-error" class="error-message"></div>
                    <form onsubmit="return handleRegister(event)">
                        <input type="text" id="register-username" placeholder="Username" required>
                        <input type="email" id="register-email" placeholder="Email" required>
                        <input type="password" id="register-password" placeholder="Password" required>
                        <button type="submit">Register</button>
                    </form>
                    <p>Already have an account? <a href="#" onclick="toggleAuthForm()">Login</a></p>
                </div>
            </div>
        </div>

        <!-- Main App Section -->
        <div id="app-section" class="section hidden">
            <header>
                <h1>My Library</h1>
                <div class="user-controls">
                    <span id="username-display"></span>
                    <button onclick="logout()">Logout</button>
                </div>
            </header>

            <div class="controls">
                <button onclick="showAddBookModal()" class="primary-button">Add New Book</button>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search books...">
                    <button onclick="searchBooks()">Search</button>
                </div>
                <div id="books-error" class="error-message"></div>
            </div>

            <div id="books-grid" class="books-grid"></div>

            <!-- Add Book Modal -->
            <div id="add-book-modal" class="modal hidden">
                <div class="modal-content">
                    <h2>Add New Book</h2>
                    <form id="add-book-form">
                        <div class="form-group">
                            <label for="book-title">Title*</label>
                            <input type="text" id="book-title" required>
                        </div>
                        <div class="form-group">
                            <label for="book-description">Description</label>
                            <textarea id="book-description"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="book-tags">Tags (comma-separated)</label>
                            <input type="text" id="book-tags" placeholder="fantasy, fiction, mystery">
                        </div>
                        <div class="form-group">
                            <label for="cover-image-url">Cover Image URL</label>
                            <input type="url" id="cover-image-url" placeholder="https://example.com/book-cover.jpg">
                        </div>
                        <div class="form-group">
                            <label for="cover-image">Or Upload Cover Image</label>
                            <input type="file" id="cover-image" accept="image/*">
                        </div>
                        <div class="form-group">
                            <label for="pdf-file">Upload PDF (optional)</label>
                            <input type="file" id="pdf-file" accept=".pdf">
                        </div>
                        <div class="button-group">
                            <button type="submit">Add Book</button>
                            <button type="button" onclick="hideAddBookModal()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
